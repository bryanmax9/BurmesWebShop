[build]
  command = "cd BurmesWeb && npm install && npx expo export -p web"
  publish = "BurmesWeb/dist"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run web"
  targetPort = 8081

# For SPA routing (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

